# Consensus Layer — Recording Rules
# Normalized expressions for head slot lag, finality distance,
# validator duty miss rates, and attestation processing.
#
# Convention: helix:cl:<client>:<description>

groups:

  # ── Lighthouse ─────────────────────────────────────────────
  - name: helix.cl.lighthouse
    interval: 30s
    rules:
      # Head slot (latest)
      - record: helix:cl:lighthouse:head_slot
        expr: >
          beacon_head_slot{job="ethereum-cl-lighthouse"}

      # Finalized epoch
      - record: helix:cl:lighthouse:finalized_epoch
        expr: >
          beacon_finalized_epoch{job="ethereum-cl-lighthouse"}

      # Distance from head to current slot (slots behind)
      - record: helix:cl:lighthouse:slot_lag
        expr: >
          (floor(time() / 12) - beacon_head_slot{job="ethereum-cl-lighthouse"})

      # Finality lag (current epoch - finalized epoch)
      - record: helix:cl:lighthouse:finality_lag
        expr: >
          (floor(time() / 384) - beacon_finalized_epoch{job="ethereum-cl-lighthouse"})

      # Attestation gossip processing rate (attestations/sec)
      - record: helix:cl:lighthouse:attestation_processing_rate5m
        expr: >
          rate(beacon_attestation_processing_requests_total{
            job="ethereum-cl-lighthouse"
          }[5m])

      # P2P peer count
      - record: helix:cl:lighthouse:p2p_peers
        expr: >
          beacon_peer_connected_count{job="ethereum-cl-lighthouse"}

      # Block import latency (p99, seconds)
      - record: helix:cl:lighthouse:block_import_latency_p99
        expr: >
          histogram_quantile(0.99,
            rate(beacon_block_processing_seconds_bucket{
              job="ethereum-cl-lighthouse"
            }[5m])
          )

  # ── Prysm ──────────────────────────────────────────────────
