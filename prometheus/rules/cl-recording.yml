          beacon_head_slot{job="ethereum-cl-prysm"}

      # Finalized epoch
      - record: helix:cl:prysm:finalized_epoch
        expr: >
          beacon_current_justified_epoch{job="ethereum-cl-prysm"}

      # Slot lag
      - record: helix:cl:prysm:slot_lag
        expr: >
          (floor(time() / 12) - beacon_head_slot{job="ethereum-cl-prysm"})

      # Finality lag
      - record: helix:cl:prysm:finality_lag
        expr: >
          (floor(time() / 384) - beacon_current_justified_epoch{job="ethereum-cl-prysm"})

      # P2P peer count
      - record: helix:cl:prysm:p2p_peers
        expr: >
          p2p_peer_count{job="ethereum-cl-prysm",state="Connected"}

      # gRPC request latency (p99, seconds)
      - record: helix:cl:prysm:grpc_latency_p99
        expr: >
          histogram_quantile(0.99,
            rate(grpc_server_handling_seconds_bucket{
              job="ethereum-cl-prysm"
            }[5m])
          )

